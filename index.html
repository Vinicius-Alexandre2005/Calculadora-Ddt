<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Calculadora do Ddtank</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#0b1020;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.container{
  background:#111831;
  padding:30px;
  border-radius:16px;
  width:350px;
  box-shadow:0 0 30px rgba(0,0,0,.5);
}

h1{
  margin-top:0;
  text-align:center;
}

label{
  font-size:14px;
  opacity:.8;
}

input{
  width:100%;
  padding:10px;
  margin:6px 0 14px;
  border-radius:8px;
  border:none;
  background:#1b2447;
  color:white;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#6366f1;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  filter:brightness(1.1);
}

.result{
  margin-top:20px;
  text-align:center;
  background:#1b2447;
  padding:15px;
  border-radius:12px;
}

.big{
  font-size:32px;
  font-weight:bold;
}
</style>
</head>

<body>
<div class="container">
  <h1>Calculadora</h1>

  <label>Distância</label>
  <input id="dist" type="number">

  <label>Relevo</label>
  <input id="h" type="number" step="0.1">

  <label>Vento</label>
  <input id="wind" type="number" step="0.1">

  <label>Ângulo</label>
  <input id="theta" type="number" step="0.1">

  <button onclick="calcular()">Calcular</button>

  <div class="result">
    <div>Força</div>
    <div class="big" id="out">—</div>
  </div>
</div>

<script>
const DEG2RAD = Math.PI / 180

// Constantes
const FORCE_MAX = 2000
const MASS = 10

// Mapa/tiro constantes
const MAP_GRAVITY = 10
const BALL_WEIGHT = 70
const MAP_DRAG = 2
const BALL_DRAG_INDEX = 1
const WIND_FACTOR = 240

const DT = 0.04
const MAX_STEPS = 650

const K_WIND = 1.0
const BAR_BIAS = +1
const FORCE_QUANT = "ceil"

function clamp(v, lo, hi){
  return Math.max(lo, Math.min(hi, v))
}

function barToForceReal(bar){
  const raw = (bar / 100) * FORCE_MAX
  if (FORCE_QUANT === "floor") return Math.floor(raw)
  if (FORCE_QUANT === "round") return Math.round(raw)
  return Math.ceil(raw)
}

/**
 * Regras:
 * - theta < 0 => tiro pra baixo (vy começa positivo)
 * - theta > 90 => tiro de costas (espelha 91->89 etc + alvo fica no -dx)
 */
function normalizeAim(thetaDeg){
  const isDown = thetaDeg < 0

  // usa magnitude pro espelhamento (ex: -120 tem magnitude 120)
  let a = Math.abs(thetaDeg)

  // normaliza magnitude 0..360
  a = ((a % 360) + 360) % 360

  // costas se estiver entre (90, 270)
  const isBack = a > 90 && a < 270

  // reduz pra 0..180
  if (a > 180) a = 360 - a

  // espelha acima de 90: 91->89, 92->88...
  if (a > 90) a = 180 - a

  return { thetaEff: a, isBack, isDown }
}

function simulateYAtDx(dxPx, hPx, windUi, thetaDeg, barInput){
  const bar = clamp(barInput + BAR_BIAS, 0, 100)

  const mapWind = windUi * K_WIND

  const af = MAP_DRAG * BALL_DRAG_INDEX
  const gf = MAP_GRAVITY * BALL_WEIGHT * MASS
  const wf = mapWind * WIND_FACTOR

  const F = barToForceReal(bar)

  const { thetaEff, isBack, isDown } = normalizeAim(thetaDeg)
  const theta = thetaEff * DEG2RAD

  let vx = F * Math.cos(theta)

  // eixo Y cresce pra baixo:
  // tiro pra cima => vy negativo
  // tiro pra baixo => vy positivo
  let vy = (isDown ? +1 : -1) * (F * Math.sin(theta))

  if (isBack) vx = -vx

  const targetX = isBack ? -dxPx : dxPx

  let x = 0
  let y = 0

  for (let step = 0; step < MAX_STEPS; step++){
    const xPrev = x
    const yPrev = y

    const ax = (wf - af * vx) / MASS
    const ay = (gf - af * vy) / MASS

    vx += ax * DT
    vy += ay * DT

    x += vx * DT
    y += vy * DT

    const crossed =
      (xPrev <= targetX && x >= targetX) ||
      (xPrev >= targetX && x <= targetX)

    if (crossed){
      const denom = (x - xPrev)
      if (Math.abs(denom) < 1e-9) return y
      const t = (targetX - xPrev) / denom
      return yPrev + t * (y - yPrev)
    }

    if (Math.abs(x) > Math.abs(targetX) + 2000) break
    if (y > 20000 || y < -20000) break
  }

  return null
}

function calcBar(dxPx, hPx, windUi, thetaDeg, opts = {}){
  const iters = opts.iters ?? 32
  const tolPx = opts.tolPx ?? 0.15

  let lo = 0
  let hi = 100

  const dyTarget = -hPx

  let best = null
  let bestErrAbs = Infinity

  for (let i = 0; i < iters; i++){
    const mid = (lo + hi) / 2
    const yMid = simulateYAtDx(dxPx, hPx, windUi, thetaDeg, mid)

    if (yMid === null){
      lo = mid
      continue
    }

    const err = yMid - dyTarget
    const errAbs = Math.abs(err)

    if (errAbs < bestErrAbs){
      bestErrAbs = errAbs
      best = mid
    }

    if (errAbs <= tolPx) break

    if (err > 0) lo = mid
    else hi = mid
  }

  return clamp(best ?? (lo + hi) / 2, 0, 100)
}

function calcular(){
  const distStr = document.getElementById("dist").value
  const hStr = document.getElementById("h").value
  const windStr = document.getElementById("wind").value
  const thetaStr = document.getElementById("theta").value

  const out = document.getElementById("out")

  // se algum campo estiver vazio, não calcula
  if (!distStr || !hStr || !windStr || !thetaStr){
    out.textContent = "—"
    return
  }

  const dist = Number(distStr)
  const hScale = Number(hStr)
  const wind = Number(windStr)
  const theta = Number(thetaStr)

  if (!Number.isFinite(dist) || !Number.isFinite(hScale) || !Number.isFinite(wind) || !Number.isFinite(theta)){
    out.textContent = "—"
    return
  }

  const h = hScale * 150
  const dx = dist * 100

  const forca = calcBar(dx, h, wind, theta)

  out.textContent = Number.isFinite(forca) ? forca.toFixed(2) : "—"
}
</script>
</body>
</html>
